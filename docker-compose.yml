services:
  db:
    image: postgres:16-alpine
    container_name: presupuesto_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-presupuesto}
      POSTGRES_USER: ${POSTGRES_USER:-presupuesto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-presupuesto_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-presupuesto}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: presupuesto_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-presupuesto}:${POSTGRES_PASSWORD:-presupuesto_pass}@db:5432/${POSTGRES_DB:-presupuesto}
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
